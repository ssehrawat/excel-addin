# E2E Live LLM Tests — Manual trigger only
#
# Runs Layer 4 with --live flag against real LLM providers.
# Records new cassettes and commits them back so replay tests stay fresh.
#
# Trigger manually: GitHub repo → Actions tab → "E2E Live LLM" → Run workflow
#
# Requires GitHub Secrets:
#   COPILOT_OPENAI_API_KEY — OpenAI API key for live testing
#   COPILOT_ANTHROPIC_API_KEY — (optional) Anthropic API key

name: E2E Live LLM

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider to test against"
        required: true
        default: "openai"
        type: choice
        options:
          - openai
          - anthropic

jobs:
  live-llm:
    name: "Layer 4 — Live LLM (${{ github.event.inputs.provider || 'openai' }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          # WHY: Need write access to commit updated cassettes back
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run live LLM tests
        env:
          COPILOT_OPENAI_API_KEY: ${{ secrets.COPILOT_OPENAI_API_KEY }}
          COPILOT_ANTHROPIC_API_KEY: ${{ secrets.COPILOT_ANTHROPIC_API_KEY }}
        run: |
          PROVIDER="${{ github.event.inputs.provider || 'openai' }}"
          python -m pytest tests/e2e/test_live_llm.py -v --live --provider="$PROVIDER"

      - name: Commit updated cassettes
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/tests/e2e/fixtures/cassettes/
          if git diff --cached --quiet; then
            echo "No cassette changes to commit."
          else
            git commit -m "chore: update Layer 4 NDJSON cassettes from live LLM run

          Provider: ${{ github.event.inputs.provider || 'openai' }}
          Triggered by: ${{ github.event_name }}"
            git push
          fi
